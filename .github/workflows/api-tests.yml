name: PushEngage API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Mondays at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check if secrets are set
      id: check-secrets
      run: |
        if [ -n "${{ secrets.PUSHENGAGE_API_KEY }}" ] && [ -n "${{ secrets.PUSHENGAGE_SITE_ID }}" ]; then
          echo "secrets_available=true" >> $GITHUB_OUTPUT
        else
          echo "secrets_available=false" >> $GITHUB_OUTPUT
          echo "⚠️ API secrets not configured. Skipping API tests."
          echo "To enable tests, add PUSHENGAGE_API_KEY and PUSHENGAGE_SITE_ID to repository secrets."
        fi
    
    - name: Run tests
      if: steps.check-secrets.outputs.secrets_available == 'true'
      run: npm test
      env:
        PUSHENGAGE_API_KEY: ${{ secrets.PUSHENGAGE_API_KEY }}
        PUSHENGAGE_SITE_ID: ${{ secrets.PUSHENGAGE_SITE_ID }}
        PUSHENGAGE_BASE_URL: ${{ secrets.PUSHENGAGE_BASE_URL || 'https://api.pushengage.com/apiv1' }}
    
    - name: Generate coverage report
      if: steps.check-secrets.outputs.secrets_available == 'true'
      run: npm run test:coverage
      continue-on-error: true
      env:
        PUSHENGAGE_API_KEY: ${{ secrets.PUSHENGAGE_API_KEY }}
        PUSHENGAGE_SITE_ID: ${{ secrets.PUSHENGAGE_SITE_ID }}
        PUSHENGAGE_BASE_URL: ${{ secrets.PUSHENGAGE_BASE_URL || 'https://api.pushengage.com/apiv1' }}
    
    - name: Upload coverage reports
      if: steps.check-secrets.outputs.secrets_available == 'true' && success()
      uses: codecov/codecov-action@v4
      continue-on-error: true
      with:
        files: ./coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
    
    - name: Archive test results
      if: always() && steps.check-secrets.outputs.secrets_available == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: |
          coverage/
          test-results/
        retention-days: 30
    
    - name: Test Summary
      if: always()
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.check-secrets.outputs.secrets_available }}" == "true" ]; then
          echo "✅ API tests executed with Node.js ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ API tests skipped - secrets not configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To enable automated tests:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to repository Settings → Secrets and variables → Actions" >> $GITHUB_STEP_SUMMARY
          echo "2. Add \`PUSHENGAGE_API_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          echo "3. Add \`PUSHENGAGE_SITE_ID\` secret" >> $GITHUB_STEP_SUMMARY
        fi
